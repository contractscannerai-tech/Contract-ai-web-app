name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Gradle wrapper & caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            artifacts/contract-ai/android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('artifacts/contract-ai/android/**/*.gradle*', 'artifacts/contract-ai/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Android SDK packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/build-cache
          key: ${{ runner.os }}-android-sdk-${{ hashFiles('artifacts/contract-ai/android/variables.gradle', 'artifacts/contract-ai/android/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-android-sdk-

      - name: Build web app
        run: pnpm --filter @workspace/contract-ai run build
        env:
          # Capacitor wraps a hosted site, so the build's BASE_URL must match.
          # If you serve from a path other than "/", set BASE_URL here.
          NODE_ENV: production

      - name: Capacitor sync (Android)
        working-directory: artifacts/contract-ai
        run: npx cap sync android
        env:
          CAPACITOR_SERVER_URL: ${{ secrets.CAPACITOR_SERVER_URL || 'https://contractai.app' }}

      - name: Make gradlew executable
        working-directory: artifacts/contract-ai/android
        run: chmod +x ./gradlew

      - name: Build debug APK
        working-directory: artifacts/contract-ai/android
        timeout-minutes: 30
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ContractAI-debug-apk
          path: artifacts/contract-ai/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
